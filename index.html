<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body data-theme="candy-dreams" data-mode="day">
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="star star-3">✨</span>
        <span class="heart heart-1">💗</span>
        <span class="heart heart-2">💛</span>
        <span class="heart heart-3">💜</span>
    </div>

    <main class="home-container">
        <div class="home-top-bar">
            <div class="user-menu">
                <button id="avatar-btn" class="avatar-btn" type="button" aria-label="Open menu">
                    <span id="avatar-initial" class="user-avatar">?</span>
                </button>
                <div id="user-dropdown" class="user-dropdown" style="display: none;">
                    <a href="analysis.html">📊 Analysis</a>
                    <a href="vision-board.html">🎯 Vision Board</a>
                    <button id="edit-pages-btn" type="button">✏️ Edit Pages</button>
                    <button id="theme-btn" type="button">🎨 Edit Themes</button>
                    <div class="user-dropdown-divider"></div>
                    <a href="profile.html">👤 Profile</a>
                    <button class="logout-btn-in-dropdown" type="button">Logout 🚪</button>
                </div>
            </div>
        </div>

        <header class="home-header">
            <div class="title-badges">
                <span class="badge">🌸</span>
                <span class="badge">🍃</span>
                <span class="badge">🌙</span>
            </div>
            <h1>My Journal</h1>
            <p class="subtitle">a cozy little space to track your days ✨</p>
        </header>

        <div id="edit-mode-bar" class="edit-mode-bar" style="display: none;">
            <span id="pages-count">0 / 12 pages</span>
            <button id="add-page-btn" class="add-page-btn" type="button">+ New Page</button>
            <button id="done-edit-btn" class="done-edit-btn" type="button">Done</button>
        </div>

        <section id="cards-grid" class="cards-grid">
            <!-- Pages rendered dynamically -->
        </section>

        <footer class="home-footer">
            <p>made with 💗 for your daily reflections</p>
        </footer>
    </main>

    <div id="page-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h2 id="page-modal-title">Create New Page</h2>
            <div class="form-group">
                <label for="page-name-input">Page Name</label>
                <input type="text" id="page-name-input" maxlength="100" placeholder="e.g. Water Intake">
            </div>
            <p id="page-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="page-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="page-modal-save" class="modal-btn primary" type="button">Save</button>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card theme-modal-card">
            <h2>Choose Your Theme</h2>
            <p class="modal-subtitle">Pick a vibe and switch between day & night.</p>
            <div id="theme-grid" class="theme-grid"></div>
            <div class="theme-actions">
                <button id="day-night-toggle" class="day-night-toggle" type="button">Night mode</button>
                <button id="theme-modal-close" class="modal-btn primary" type="button">Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            setupThemeButtons();
            initHomePage();
            setupUserMenu();
        });
    </script>
</body>
</html>
