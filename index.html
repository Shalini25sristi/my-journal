<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="star star-3">✨</span>
        <span class="heart heart-1">💗</span>
        <span class="heart heart-2">💛</span>
        <span class="heart heart-3">💜</span>
    </div>

    <main class="home-container">
        <div class="home-top-bar">
            <span id="current-user" class="current-user"></span>
            <div class="home-top-actions">
                <button id="edit-pages-btn" class="edit-btn" type="button">✏️ Edit Pages</button>
                <button class="logout-btn" type="button">Logout 🚪</button>
            </div>
        </div>

        <header class="home-header">
            <div class="title-badges">
                <span class="badge">🌸</span>
                <span class="badge">🍃</span>
                <span class="badge">🌙</span>
            </div>
            <h1>My Journal</h1>
            <p class="subtitle">a cozy little space to track your days ✨</p>
        </header>

        <div id="edit-mode-bar" class="edit-mode-bar" style="display: none;">
            <span id="pages-count">0 / 12 pages</span>
            <button id="add-page-btn" class="add-page-btn" type="button">+ New Page</button>
            <button id="done-edit-btn" class="done-edit-btn" type="button">Done</button>
        </div>

        <section id="cards-grid" class="cards-grid">
            <!-- Pages rendered dynamically -->
        </section>

        <footer class="home-footer">
            <p>made with 💗 for your daily reflections</p>
        </footer>
    </main>

    <div id="page-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h2 id="page-modal-title">Create New Page</h2>
            <div class="form-group">
                <label for="page-name-input">Page Name</label>
                <input type="text" id="page-name-input" maxlength="100" placeholder="e.g. Water Intake">
            </div>
            <p id="page-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="page-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="page-modal-save" class="modal-btn primary" type="button">Save</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHomePage();
        });
    </script>
</body>
</html>
