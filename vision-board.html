<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Board | My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body data-theme="candy-dreams" data-mode="day">
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="heart heart-1">💗</span>
    </div>

    <main class="page-container vision-board-container">
        <div class="top-bar">
            <a href="index.html" class="back-btn">← Back home</a>
            <div class="top-bar-right">
                <div class="user-menu">
                    <button id="avatar-btn" class="avatar-btn" type="button" aria-label="Open menu">
                        <span id="avatar-initial" class="user-avatar">?</span>
                    </button>
                    <div id="user-dropdown" class="user-dropdown" style="display: none;">
                        <a href="analysis.html">📊 Analysis</a>
                        <a href="vision-board.html">🎯 Vision Board</a>
                        <button id="edit-pages-btn" type="button">✏️ Edit Pages</button>
                        <button id="theme-btn" type="button">🎨 Edit Themes</button>
                        <div class="user-dropdown-divider"></div>
                        <a href="profile.html">👤 Profile</a>
                        <button class="logout-btn-in-dropdown" type="button">Logout 🚪</button>
                    </div>
                </div>
            </div>
        </div>

        <header class="page-header">
            <h1>🎯 Vision Board</h1>
            <p>Visualize your goals and dreams.</p>
        </header>

        <div class="vision-controls">
            <div class="control-group">
                <label for="timeframe-select">Timeframe</label>
                <select id="timeframe-select">
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="halfyearly">Half Yearly</option>
                    <option value="yearly">Yearly</option>
                    <option value="5year">5 Years</option>
                    <option value="10year">10 Years</option>
                </select>
            </div>
            <div class="control-group" id="target-control">
                <label for="target-select">Period</label>
                <select id="target-select"></select>
            </div>
            <div class="vision-actions">
                <button id="add-text-btn" class="modal-btn primary" type="button">✏️ Add Text</button>
                <button id="add-image-btn" class="modal-btn primary" type="button">🖼️ Add Image</button>
            </div>
            <span id="item-count" class="item-count">0 / 40 items</span>
        </div>

        <div class="vision-board-wrapper">
            <div class="vision-board-title">
                <input type="text" id="board-title" maxlength="100" placeholder="Enter your vision title...">
                <button id="save-title-btn" class="modal-btn secondary" type="button">Save Title</button>
            </div>

            <div id="vision-board" class="vision-board">
                <div class="vision-board-center">
                    <span id="center-title">Your Vision</span>
                    <span id="center-period">Monthly · July 2026</span>
                </div>
                <div id="board-items" class="board-items"></div>
            </div>
        </div>
    </main>

    <div id="text-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h2>Add Text</h2>
            <div class="form-group">
                <label for="text-content">Your affirmation or goal</label>
                <textarea id="text-content" rows="3" maxlength="200" placeholder="e.g. I am confident and successful"></textarea>
            </div>
            <p id="text-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="text-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="text-modal-save" class="modal-btn primary" type="button">Add</button>
            </div>
        </div>
    </div>

    <div id="image-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card">
            <h2>Add Image</h2>
            <div class="form-group">
                <label for="image-file">Choose an image</label>
                <input type="file" id="image-file" accept="image/*">
            </div>
            <div id="image-preview" class="image-preview"></div>
            <p class="modal-subtitle">Max 80 items total. Images are stored as base64.</p>
            <p id="image-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="image-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="image-modal-save" class="modal-btn primary" type="button">Add</button>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card theme-modal-card">
            <h2>Choose Your Theme</h2>
            <p class="modal-subtitle">Pick a vibe and switch between day & night.</p>
            <div id="theme-grid" class="theme-grid"></div>
            <div class="theme-actions">
                <button id="day-night-toggle" class="day-night-toggle" type="button">🌙</button>
                <button id="theme-modal-close" class="modal-btn primary" type="button">Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            setupThemeButtons();
            initVisionBoardPage();
            setupUserMenu();
        });
    </script>
</body>
</html>
