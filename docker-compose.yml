services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: journal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-journal}
      POSTGRES_DB: myjournal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journal"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://journal:${POSTGRES_PASSWORD:-journal}@db:5432/myjournal
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-secret-string}

volumes:
  pgdata:
