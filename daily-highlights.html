<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Highlights | My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌈</span>
        <span class="heart heart-1">💛</span>
    </div>

    <main class="page-container">
        <div class="top-bar">
            <a href="index.html" class="back-btn">← Back home</a>
            <div class="year-picker">
                <label for="year-select">Year</label>
                <select id="year-select"></select>
            </div>
            <div class="stats-pill">
                <span>📝</span>
                <span id="entries-count">0 entries</span>
            </div>
        </div>

        <header class="page-header">
            <h1>🌈 Daily Highlights</h1>
            <p>Write a few lines about every date of the year.</p>
        </header>

        <div class="save-bar">
            <span id="save-status" class="save-status"></span>
        </div>

        <nav class="tracker-nav">
            <a href="tracker.html?type=physical-mental-care" class="nav-btn prev-btn">← 💪 Physical & Mental Care</a>
            <a href="index.html" class="nav-btn next-btn">🏠 Back home →</a>
        </nav>

        <section id="highlights-grid" class="highlights-grid"></section>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initHighlightsPage();
        });
    </script>
</body>
</html>
