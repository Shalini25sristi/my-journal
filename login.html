<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body data-theme="candy-dreams" data-mode="day">
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="heart heart-1">💗</span>
    </div>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="title-badges">
                    <span class="badge">🌸</span>
                    <span class="badge">🍃</span>
                    <span class="badge">🌙</span>
                </div>
                <h1>Welcome Back</h1>
                <p class="subtitle">log in to continue your cozy journal ✨</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="your_username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="login-btn">Continue 💗</button>
            </form>

            <p id="login-message" class="login-message"></p>

            <div class="auth-switch">
                <p class="login-hint">New here?</p>
                <a href="register.html" class="auth-switch-btn">Create your journal 🌱</a>
            </div>

            <button id="theme-btn" class="theme-btn floating-theme-btn" type="button">🎨 Edit Themes</button>
        </div>
    </main>

    <div id="theme-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card theme-modal-card">
            <h2>Choose Your Theme</h2>
            <p class="modal-subtitle">Pick a vibe and switch between day & night.</p>
            <div id="theme-grid" class="theme-grid"></div>
            <div class="theme-actions">
                <button id="day-night-toggle" class="day-night-toggle" type="button">Night mode</button>
                <button id="theme-modal-close" class="modal-btn primary" type="button">Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            setupThemeButtons();
            initLoginPage();
        });
    </script>
</body>
</html>
