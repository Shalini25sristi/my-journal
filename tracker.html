<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker | My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="heart heart-1">💗</span>
    </div>

    <main class="page-container">
        <div class="top-bar">
            <a href="index.html" class="back-btn">← Back home</a>
            <div class="year-picker">
                <label for="year-select">Year</label>
                <select id="year-select"></select>
            </div>
            <div class="top-bar-right">
                <button id="edit-options-btn" class="edit-btn" type="button">✏️ Edit Options</button>
                <span id="current-user" class="current-user"></span>
                <button class="logout-btn" type="button">Logout 🚪</button>
            </div>
        </div>

        <header class="page-header">
            <h1 id="tracker-title">Tracker</h1>
            <p id="tracker-subtitle">Tick the days you completed this habit.</p>
        </header>

        <div class="save-bar">
            <span id="save-status" class="save-status"></span>
        </div>

        <nav class="tracker-nav" id="tracker-nav">
            <a href="#" class="nav-btn prev-btn" id="prev-tracker">← Previous</a>
            <a href="#" class="nav-btn next-btn" id="next-tracker">Next →</a>
        </nav>

        <div class="tracker-layout">
            <div id="rating-legend" class="rating-legend" style="display: none;"></div>
            <section id="calendar-grid" class="year-grid"></section>
        </div>
    </main>

    <div id="options-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card options-modal-card">
            <h2>Edit Options</h2>
            <p class="modal-subtitle">Customize up to 10 options for this page.</p>
            <div id="options-editor" class="options-editor">
                <!-- Option rows rendered dynamically -->
            </div>
            <button id="add-option-btn" class="add-option-btn" type="button">+ Add Option</button>
            <p id="options-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="options-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="options-modal-save" class="modal-btn primary" type="button">Save Options</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTrackerPage();
            setupLogoutButtons();
            showCurrentUser();
        });
    </script>
</body>
</html>
