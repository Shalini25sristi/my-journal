<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker | My Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
</head>
<body data-theme="candy-dreams" data-mode="day">
    <div class="bg-decoration">
        <span class="cloud cloud-1">☁️</span>
        <span class="cloud cloud-2">☁️</span>
        <span class="sun sun-2">🌞</span>
        <span class="star star-1">✨</span>
        <span class="star star-2">🌟</span>
        <span class="heart heart-1">💗</span>
    </div>

    <main class="page-container">
        <div class="top-bar">
            <a href="index.html" class="back-btn">← Back home</a>
            <div class="year-picker">
                <label for="year-select">Year</label>
                <select id="year-select"></select>
            </div>
            <div class="top-bar-right">
                <div class="user-menu">
                    <button id="avatar-btn" class="avatar-btn" type="button" aria-label="Open menu">
                        <span id="avatar-initial" class="user-avatar">?</span>
                    </button>
                    <div id="user-dropdown" class="user-dropdown" style="display: none;">
                        <a href="analysis.html">📊 Analysis</a>
                        <a href="vision-board.html">🎯 Vision Board</a>
                        <button id="edit-options-btn" type="button">✏️ Edit Options</button>
                        <button id="edit-pages-btn" type="button">✏️ Edit Pages</button>
                        <button id="theme-btn" type="button">🎨 Edit Themes</button>
                        <div class="user-dropdown-divider"></div>
                        <a href="profile.html">👤 Profile</a>
                        <button class="logout-btn-in-dropdown" type="button">Logout 🚪</button>
                    </div>
                </div>
            </div>
        </div>

        <header class="page-header">
            <h1 id="tracker-title">Tracker</h1>
            <p id="tracker-subtitle">Tick the days you completed this habit.</p>
        </header>

        <div class="save-bar">
            <span id="save-status" class="save-status"></span>
            <span id="streak-status" class="streak-status"></span>
        </div>

        <nav class="tracker-nav" id="tracker-nav">
            <a href="#" class="nav-btn prev-btn" id="prev-tracker">← Previous</a>
            <a href="#" class="nav-btn next-btn" id="next-tracker">Next →</a>
        </nav>

        <div class="tracker-layout">
            <div id="rating-legend" class="rating-legend" style="display: none;"></div>
            <section id="calendar-grid" class="year-grid"></section>
        </div>
    </main>

    <div id="options-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card options-modal-card">
            <h2>Edit Options</h2>
            <p class="modal-subtitle">Customize up to 10 options for this page.</p>
            <div id="options-editor" class="options-editor">
                <!-- Option rows rendered dynamically -->
            </div>
            <button id="add-option-btn" class="add-option-btn" type="button">+ Add Option</button>
            <p id="options-modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="options-modal-cancel" class="modal-btn secondary" type="button">Cancel</button>
                <button id="options-modal-save" class="modal-btn primary" type="button">Save Options</button>
            </div>
        </div>
    </div>

    <div id="theme-modal" class="modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-card theme-modal-card">
            <h2>Choose Your Theme</h2>
            <p class="modal-subtitle">Pick a vibe and switch between day & night.</p>
            <div id="theme-grid" class="theme-grid"></div>
            <div class="theme-actions">
                <button id="day-night-toggle" class="day-night-toggle" type="button">Night mode</button>
                <button id="theme-modal-close" class="modal-btn primary" type="button">Done</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            setupThemeButtons();
            initTrackerPage();
            setupUserMenu();
        });
    </script>
</body>
</html>
